    statRows()+"<button class='tb big' id='m-restart'>RUN IT AGAIN</button>")}

/* ---------- master tick ---------- */
function updateFlags(){const F=ST.flags;
  if(!F.zone&&ST.zone.size>=4)F.zone=true;
  let walls=0,doors=0,pods=0,synth=false,vat=false,gen=false,tur=false,bea=false;
  for(const s of ST.structs.values()){if(s.bp)continue;
    if(s.type==="wall")walls++;if(s.type==="door")doors++;if(s.type==="pod")pods++;
    if(s.type==="synth")synth=true;if(s.type==="vat")vat=true;
    if(s.type==="gen")gen=true;if(s.type==="turret")tur=true;if(s.type==="beacon")bea=true}
  if(!F.haul&&ST.stats.hauled>=3)F.haul=true;
  if(!F.wall&&walls>=8&&doors>=1)F.wall=true;
  if(!F.pod&&pods>=2)F.pod=true;
  if(!F.food&&synth&&vat)F.food=true;
  if(!F.pwr&&gen)F.pwr=true;
  if(!F.def&&tur)F.def=true;
  if(!F.beacon&&bea)F.beacon=true;
  renderChecklist()}
function tick(){ST.tick++;
  if(ST.tick%10===0)powerRecalc();
  if(ST.tick%5===0&&ST.fog){for(const p of ST.pawns){
    const px=p.px|0,py=p.py|0;
    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
      if(dx*dx+dy*dy>16)continue;
      const X=px+dx,Y=py+dy;
      if(X>=0&&X<MW&&Y>=0&&Y<MH)ST.fog[X+Y*MW]=0}}}
  if(ST.tick%20===0){
    for(const s of ST.structs.values()){if(s.bp)continue;
      if(s.type==="vat"&&s.powered){s.vt+=20;
        if(s.vt>=600){s.vt=0;ST.res.raw+=3;
          float(s.x+.5,s.y+.5,"+3 PROTEIN","#b8ff5e");syncHUD()}}
      if(s.type==="beacon"&&s.powered){s.charge+=20;
        if(s.charge>=TPD)win()}}}
  for(let i=ST.pawns.length-1;i>=0;i--)pawnTick(ST.pawns[i]);
  for(const f of ST.foes)if(!f.gone&&f.hp>0)foeTick(f);
  for(const s of ST.structs.values())if(s.type==="turret")turretTick(s);
  if(ST.foes.length)ST.foes=ST.foes.filter(f=>!f.gone&&f.hp>0);
  for(let i=ST.beams.length-1;i>=0;i--)if(--ST.beams[i].ttl<=0)ST.beams.splice(i,1);
  for(let i=ST.floats.length-1;i>=0;i--)if(--ST.floats[i].ttl<=0)ST.floats.splice(i,1);
  if(ST.tick%25===0&&ST.items.length&&ST.zone.size){
    for(let i=ST.items.length-1;i>=0;i--){const it=ST.items[i];
      if(it.resv)continue;
      if(ST.zone.has(K(it.x,it.y))){ST.res[it.res]+=it.qty;ST.stats.hauled++;
        float(it.x+.5,it.y+.5,"+"+it.qty+" "+RESNAME[it.res].toUpperCase(),RESCOL[it.res]);
        it.gone=true;ST.items.splice(i,1);syncHUD()}}}
  if(ST.tick>=ST.nextEv)fireEvent();
  if(ST.tick%30===0)updateFlags();
  if(ST.tick%10===0)syncHUD();
  if(ST.tick%25===0)renderInspect()}

/* ============================================================
   RENDERING
   ============================================================ */
const cv=$("c"),ctx=cv.getContext("2d");
const oc=document.createElement("canvas"),octx=oc.getContext("2d");
const tc=document.createElement("canvas");tc.width=MW*T;tc.height=MH*T;
const tctx=tc.getContext("2d");
let VW=0,VH=0,dpr=1;
const cam={x:0,y:0,z:1.6};
function resize(){dpr=window.devicePixelRatio||1;
  VW=window.innerWidth;VH=window.innerHeight;
  cv.width=Math.floor(VW*dpr);cv.height=Math.floor(VH*dpr);
  cv.style.width=VW+"px";cv.style.height=VH+"px";
  oc.width=cv.width;oc.height=cv.height;clampCam()}
function clampCam(){const vw=VW/cam.z,vh=VH/cam.z;
  cam.x=clamp(cam.x,-60,Math.max(-60,MW*T-vw+60));
  cam.y=clamp(cam.y,-60,Math.max(-60,MH*T-vh+60))}
function lightLevel(h){
  if(h>=6.5&&h<18.5)return 0;
  if(h>=18.5&&h<21)return (h-18.5)/2.5*.78;
  if(h>=21||h<4.5)return .78;
  return (1-(h-4.5)/2)*.78}

function drawTerrain(){const g=tctx;
  g.fillStyle="#0b0d15";g.fillRect(0,0,MW*T,MH*T);
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const t=ST.ter[x+y*MW],X=x*T,Y=y*T,h=hash2(x*3,y*7);
    g.fillStyle=t===3?"#0b0d11":t===1?"#0d1019":"#10131d";
    g.fillRect(X,Y,T,T);
    if(t===2){g.strokeStyle="#1b2030";g.beginPath();
      g.moveTo(X+3,Y+12);g.lineTo(X+9,Y+6);g.lineTo(X+13,Y+9);g.stroke()}
    if(t===3&&h<.5){g.fillStyle="#15171c";
      g.fillRect(X+((h*12)|0)+2,Y+(((h*97)%1*12)|0)+2,2,2)}
    if(t<2&&h>.93){g.strokeStyle="#141a2a";g.strokeRect(X+3.5,Y+3.5,9,9)}
    if((x+y)%2===0){g.fillStyle="rgba(0,0,0,.12)";g.fillRect(X,Y,T,1)}}
  g.strokeStyle="rgba(0,229,255,.15)";g.strokeRect(.5,.5,MW*T-1,MH*T-1)}

function rr(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x,y,w,h)}
function drawStruct(s){const X=s.x*T,Y=s.y*T,d=DEF[s.type];
  if(s.bp){ctx.fillStyle="rgba(0,229,255,.08)";ctx.fillRect(X+1,Y+1,T-2,T-2);
    ctx.strokeStyle="rgba(0,229,255,.55)";ctx.setLineDash([3,3]);
    ctx.strokeRect(X+1.5,Y+1.5,T-3,T-3);ctx.setLineDash([]);
    if(s.prog>0){ctx.fillStyle="#00e5ff";
      ctx.fillRect(X+2,Y+T-4,(T-4)*clamp(s.prog/s.need,0,1),2)}}
  else switch(s.type){
    case "ruin":rr(X,Y,T,T,"#2c281d");rr(X+1,Y+1,T-2,3,"#3a3527");
      rr(X+2,Y+6,4,2,"#221f16");rr(X+9,Y+10,5,2,"#221f16");break;
    case "scrap":rr(X+2,Y+6,12,8,"#3c4350");rr(X+1,Y+9,9,6,"#4a5160");
      rr(X+7,Y+4,7,7,"#333a46");rr(X+5,Y+7,2,2,"#ff9f2d");rr(X+11,Y+11,2,2,"#ff9f2d");break;
    case "cache":rr(X+2,Y+3,12,11,"#5d5330");rr(X+2,Y+8,12,2,"#3e3720");rr(X+7,Y+3,2,11,"#3e3720");break;
    case "wall":rr(X,Y,T,T,"#222a3d");rr(X,Y,T,3,"#39496e");rr(X+1,Y+T-2,T-2,1,"#161c2c");break;
    case "door":rr(X,Y,T,T,"#1b2233");rr(X+2,Y+2,T-4,T-4,"#10141f");
      rr(X+T/2-1,Y+2,2,T-4,"#00e5ff");break;
    case "pod":rr(X+1,Y+3,T-2,T-6,"#15202f");rr(X+2,Y+4,T-4,T-8,"#0d1521");
      rr(X+3,Y+5,4,T-10,"#27405c");
      ctx.strokeStyle=s.owner?"#39ff88":"#23364f";ctx.strokeRect(X+1.5,Y+3.5,T-3,T-7);break;
    case "synth":rr(X+1,Y+2,T-2,T-4,"#1b2233");
      rr(X+3,Y+4,T-6,5,s.powered?"#ff2d95":"#3a2030");
      rr(X+3,Y+11,3,2,"#0a0e16");rr(X+8,Y+11,5,2,"#0a0e16");break;
    case "vat":{rr(X+2,Y+1,T-4,T-2,"#1b2a26");
      const lvl=(T-6)*clamp(s.vt/600,0,1);
      rr(X+4,Y+T-3-lvl,T-8,lvl,s.powered?"#39ff88":"#1d4b34");
      ctx.strokeStyle="#2f4a40";ctx.strokeRect(X+2.5,Y+1.5,T-5,T-3);break}
    case "gen":{rr(X+1,Y+1,T-2,T-2,"#262d3f");
      const pulse=s.powered?(.6+.4*Math.sin(ST.tick*.2)):.15;
      ctx.fillStyle="rgba(255,216,74,"+pulse.toFixed(2)+")";
      ctx.fillRect(X+5,Y+5,T-10,T-10);break}
    case "lamp":rr(X+T/2-1,Y+4,2,T-6,"#3a4763");
      ctx.fillStyle=s.powered?"#00e5ff":"#1c3a44";ctx.fillRect(X+T/2-3,Y+2,6,4);break;
    case "turret":{rr(X+2,Y+2,T-4,T-4,"#262d3f");
      ctx.save();ctx.translate(X+T/2,Y+T/2);ctx.rotate(s.aim||0);
      ctx.fillStyle="#9fb4d8";ctx.fillRect(0,-1.5,9,3);ctx.restore();
      ctx.fillStyle=s.powered?"#ffd84a":"#5a4a1c";
      ctx.fillRect(X+T/2-2,Y+T/2-2,4,4);break}
    case "beacon":{rr(X+5,Y+1,6,T-2,"#27314a");
      const a=.4+.4*Math.sin(ST.tick*.15);
      ctx.fillStyle=s.powered?"rgba(0,229,255,"+a.toFixed(2)+")":"#1c3a44";
      ctx.fillRect(X+6,Y+2,4,4);
      if(s.charge>0){ctx.fillStyle="#00e5ff";
        ctx.fillRect(X+2,Y+T-3,(T-4)*clamp(s.charge/TPD,0,1),2)}break}}
  if(s.desig){ctx.strokeStyle="#ff9f2d";ctx.strokeRect(X+.5,Y+.5,T-1,T-1)}
  if(s.decon){ctx.strokeStyle="#ff4757";ctx.beginPath();
    ctx.moveTo(X+2,Y+2);ctx.lineTo(X+T-2,Y+T-2);
    ctx.moveTo(X+T-2,Y+2);ctx.lineTo(X+2,Y+T-2);ctx.stroke()}
  if(!s.bp&&s.hp<s.maxHp&&DEF[s.type].hp>1){
    ctx.fillStyle="#101626";ctx.fillRect(X+1,Y-3,T-2,2);
    ctx.fillStyle="#ff4757";ctx.fillRect(X+1,Y-3,(T-2)*clamp(s.hp/s.maxHp,0,1),2)}}

function drawBody(p,X,Y){
  ctx.fillStyle="#1a2130";ctx.fillRect(X-3.5,Y-3,7,9);
  ctx.fillStyle=p.accent;ctx.fillRect(X-3.5,Y-3,7,2);
  ctx.fillStyle="#0e1420";ctx.fillRect(X-3,Y-9,6,6);
  ctx.fillStyle=p.accent;ctx.fillRect(X-3,Y-7,6,1.5);
  if(p.drafted||ST.foes.length){ctx.fillStyle="#8fa3c4";ctx.fillRect(X+3,Y-1,5,2)}}
function drawPawn(p){const X=p.px*T,Y=p.py*T;
  ctx.fillStyle="rgba(0,0,0,.4)";ctx.beginPath();ctx.ellipse(X,Y+5,5,2,0,0,7);ctx.fill();
  const sel=ST.sel.includes(p);
  if(sel){ctx.strokeStyle="#00e5ff";ctx.beginPath();ctx.arc(X,Y,8,0,7);ctx.stroke()}
  if(p.sleeping){ctx.save();ctx.translate(X,Y);ctx.rotate(Math.PI/2);drawBody(p,0,0);ctx.restore();
    ctx.fillStyle="#7df9ff";ctx.font="7px monospace";ctx.fillText("z",X+5,Y-6)}
  else drawBody(p,X,Y);
  if(p.carry){ctx.fillStyle=RESCOL[p.carry.res];ctx.fillRect(X-2,Y-13,4,4)}
  if(p.drafted){ctx.fillStyle="#ff4757";ctx.beginPath();
    ctx.moveTo(X,Y-12);ctx.lineTo(X-3,Y-16);ctx.lineTo(X+3,Y-16);ctx.fill()}
  if(p.dazed>ST.tick){ctx.fillStyle="#ffd84a";ctx.font="8px monospace";ctx.fillText("?",X+5,Y-8)}
  if(sel||ST.tick-p.hurtT<60){ctx.fillStyle="#101626";ctx.fillRect(X-7,Y+8,14,2);
    ctx.fillStyle="#39ff88";ctx.fillRect(X-7,Y+8,14*clamp(p.hp/100,0,1),2)}
  if(sel){ctx.fillStyle=p.accent;ctx.font="7px monospace";ctx.textAlign="center";
    ctx.fillText(p.name.split(" ")[0],X,Y-18);ctx.textAlign="left"}}
function drawFoe(f){const X=f.px*T,Y=f.py*T;
  ctx.fillStyle="rgba(0,0,0,.4)";ctx.beginPath();ctx.ellipse(X,Y+5,5,2,0,0,7);ctx.fill();
  const big=f.fk==="bruiser",w=big?9:7,h=big?11:9;
  ctx.fillStyle="#241723";ctx.fillRect(X-w/2,Y-3,w,h);
  ctx.fillStyle=f.col;ctx.fillRect(X-w/2,Y-3,w,2);
  ctx.fillStyle="#120a12";ctx.fillRect(X-3,Y-9,6,6);
  ctx.fillStyle=f.col;ctx.fillRect(X-3,Y-7,6,1.5);
  if(f.fk==="gunner"){ctx.fillStyle="#c47b8f";ctx.fillRect(X+3,Y-1,5,2)}
  if(ST.sel.includes(f)){ctx.strokeStyle="#ff4757";ctx.beginPath();ctx.arc(X,Y,8,0,7);ctx.stroke()}
  if(f.hp<f.maxHp){ctx.fillStyle="#101626";ctx.fillRect(X-7,Y+8,14,2);
    ctx.fillStyle="#ff4757";ctx.fillRect(X-7,Y+8,14*clamp(f.hp/f.maxHp,0,1),2)}}

function toolColor(){if(!TOOL)return "#00e5ff";
  return TOOL.k==="salv"?"#ff9f2d":(TOOL.k==="decon"||TOOL.k==="cancel")?"#ff4757":
    (TOOL.k==="zadd"||TOOL.k==="zdel")?"#39ff88":"#00e5ff"}
function drawToolOverlay(){
  if(PT.marq){const m=PT.marq;
    ctx.strokeStyle=m.rect?toolColor():"#00e5ff";ctx.setLineDash([4,3]);
    ctx.strokeRect(Math.min(m.x0,m.x1),Math.min(m.y0,m.y1),
      Math.abs(m.x1-m.x0),Math.abs(m.y1-m.y0));ctx.setLineDash([])}
  if(TOOL&&TOOL.k==="build"&&INB(PT.hoverX,PT.hoverY)){
    const x=PT.hoverX*T,y=PT.hoverY*T;
    const ok=canPlace(TOOL.type,PT.hoverX,PT.hoverY)&&afford(DEF[TOOL.type].cost);
    ctx.fillStyle=ok?"rgba(0,229,255,.22)":"rgba(255,71,87,.22)";ctx.fillRect(x,y,T,T);
    ctx.strokeStyle=ok?"#00e5ff":"#ff4757";ctx.strokeRect(x+.5,y+.5,T-1,T-1)}
  else if(TOOL&&INB(PT.hoverX,PT.hoverY)){ctx.strokeStyle=toolColor();
    ctx.strokeRect(PT.hoverX*T+.5,PT.hoverY*T+.5,T-1,T-1)}}

function nightPass(){const la=lightLevel(hourN());if(la<=.02)return;
  const z=cam.z;
  octx.setTransform(1,0,0,1,0,0);octx.clearRect(0,0,oc.width,oc.height);
  octx.globalCompositeOperation="source-over";
  octx.fillStyle="rgba(7,11,32,"+la.toFixed(2)+")";octx.fillRect(0,0,oc.width,oc.height);
  octx.globalCompositeOperation="destination-out";
  function light(wx,wy,r,a){
    const sx=(wx*T-cam.x)*z*dpr,sy=(wy*T-cam.y)*z*dpr,sr=r*T*z*dpr;
    if(sx<-sr||sy<-sr||sx>oc.width+sr||sy>oc.height+sr)return;
    const g=octx.createRadialGradient(sx,sy,0,sx,sy,sr);
    g.addColorStop(0,"rgba(255,255,255,"+a+")");g.addColorStop(1,"rgba(255,255,255,0)");
    octx.fillStyle=g;octx.beginPath();octx.arc(sx,sy,sr,0,7);octx.fill()}
  for(const s of ST.structs.values()){if(s.bp)continue;
    if(s.type==="lamp"&&s.powered)light(s.x+.5,s.y+.5,5,.95);
    else if((s.type==="gen"||s.type==="synth"||s.type==="vat")&&s.powered)light(s.x+.5,s.y+.5,2.2,.6);
    else if(s.type==="beacon"&&s.powered)light(s.x+.5,s.y+.5,5+Math.sin(ST.tick*.1),.8)}
  for(const p of ST.pawns)light(p.px,p.py,1.7,.55);
  for(const b of ST.beams)light(b.x0,b.y0,2,.5*b.ttl/b.t0);
  ctx.setTransform(1,0,0,1,0,0);ctx.drawImage(oc,0,0)}

function menuBg(){ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle="#04050a";ctx.fillRect(0,0,VW,VH);
  ctx.strokeStyle="rgba(0,229,255,.06)";
  const o=(performance.now()/60)%40;
  for(let x=-140+o;x<VW+40;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x-100,VH);ctx.stroke()}}

function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle="#04050a";ctx.fillRect(0,0,VW,VH);
  if(ST.phase==="menu"){menuBg();return}
  const z=cam.z;
  ctx.setTransform(dpr*z,0,0,dpr*z,-cam.x*dpr*z,-cam.y*dpr*z);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(tc,0,0);
  const x0=clamp(Math.floor(cam.x/T)-1,0,MW-1),y0=clamp(Math.floor(cam.y/T)-1,0,MH-1);
  const x1=clamp(Math.ceil((cam.x+VW/z)/T)+1,0,MW),y1=clamp(Math.ceil((cam.y+VH/z)/T)+1,0,MH);
  // stockpile zone
  ctx.fillStyle="rgba(0,229,255,.05)";ctx.strokeStyle="rgba(0,229,255,.18)";
  for(const k of ST.zone){const c=k.split(",");const x=+c[0],y=+c[1];
    if(x<x0||x>=x1||y<y0||y>=y1)continue;
    ctx.fillRect(x*T,y*T,T,T);ctx.strokeRect(x*T+.5,y*T+.5,T-1,T-1)}
  // items (hidden in fog)
  for(const it of ST.items){if(it.x<x0||it.x>=x1||it.y<y0||it.y>=y1)continue;
    if(ST.fog&&ST.fog[it.x+it.y*MW])continue;
    const X=it.x*T+T/2,Y=it.y*T+T/2;
    ctx.fillStyle="#0c1018";ctx.fillRect(X-4,Y-3,8,7);
    ctx.fillStyle=RESCOL[it.res];ctx.fillRect(X-3,Y-2,6,5);
    if(z>1.05){ctx.fillStyle="#dfe9f7";ctx.font="6px monospace";ctx.textAlign="center";
      ctx.fillText(it.qty,X,Y+10);ctx.textAlign="left"}}
  // fog overlay — over terrain, under structures
  if(ST.fog){ctx.fillStyle="rgba(0,0,0,0.75)";
    for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){if(ST.fog[x+y*MW])ctx.fillRect(x*T,y*T,T,T)}}
  // structures (scrap/cache hidden in fog; player-built always visible)
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){const s=structAt(x,y);
    if(!s)continue;
    if((s.type==="scrap"||s.type==="cache")&&ST.fog&&ST.fog[s.x+s.y*MW])continue;
    drawStruct(s)}
  // move-order markers
  for(const p of ST.pawns)if(p.drafted&&p.order){
    ctx.strokeStyle="rgba(0,229,255,.5)";
    ctx.strokeRect(p.order.x*T+5.5,p.order.y*T+5.5,5,5)}
  for(const p of ST.pawns)drawPawn(p);
  for(const f of ST.foes)drawFoe(f);
  // beams
  for(const b of ST.beams){const a=b.ttl/b.t0;
    ctx.globalAlpha=a;ctx.strokeStyle=b.col;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(b.x0*T,b.y0*T);ctx.lineTo(b.x1*T,b.y1*T);ctx.stroke()}
  ctx.globalAlpha=1;ctx.lineWidth=1;
  // floating text
  ctx.font="7px monospace";ctx.textAlign="center";
  for(const f of ST.floats){const a=f.ttl/f.t0;ctx.globalAlpha=a;
    ctx.fillStyle=f.col;ctx.fillText(f.txt,f.x*T,f.y*T-10-(1-a)*10)}
  ctx.globalAlpha=1;ctx.textAlign="left";
  drawToolOverlay();
  nightPass();
  // screen-space effects
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(ST.storm>ST.tick){
    ctx.fillStyle="rgba(255,45,149,"+(0.04+0.03*Math.sin(ST.tick*.7)).toFixed(3)+")";
    ctx.fillRect(0,0,VW,VH);
    if(Math.random()<.08){ctx.fillStyle="rgba(255,45,149,.22)";
      ctx.fillRect(0,Math.random()*VH,VW,2)}}
  const vg=ctx.createRadialGradient(VW/2,VH/2,Math.min(VW,VH)*.45,VW/2,VH/2,Math.max(VW,VH)*.78);
  vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(0,0,0,.45)");
  ctx.fillStyle=vg;ctx.fillRect(0,0,VW,VH)}

/* ============================================================
   INPUT & TOOLS
   ============================================================ */
const PT={down:false,btn:0,sx:0,sy:0,lx:0,ly:0,moved:false,panning:false,
  marq:null,paint:null,lastC:null,hoverX:-1,hoverY:-1,hwx:0,hwy:0,
  touches:new Map(),pinch:null};
let TOOL=null;
const KEYS={};
function s2w(sx,sy){return{wx:sx/cam.z+cam.x,wy:sy/cam.z+cam.y}}
function cellAt(sx,sy){const w=s2w(sx,sy);
  return{x:Math.floor(w.wx/T),y:Math.floor(w.wy/T),wx:w.wx,wy:w.wy}}
function selPawns(){return ST.sel.filter(e=>e.kind==="pawn")}
function pawnAt(wx,wy){let best=null,bd=.8;
  for(const p of ST.pawns){const d=DIST(wx/T,wy/T,p.px,p.py);if(d<bd){bd=d;best=p}}return best}
function foeAt(wx,wy){let best=null,bd=.8;
  for(const f of ST.foes){const d=DIST(wx/T,wy/T,f.px,f.py);if(d<bd){bd=d;best=f}}return best}

function setTool(t){TOOL=t;$("cancelTool").style.display=t?"block":"none";refreshToolBtns()}
function dragToolKind(){if(!TOOL)return null;
  if(TOOL.k==="build")return TOOL.type==="wall"?"paint":"single";
  return "rect"}
function applyCell(x,y){if(!INB(x,y)||!TOOL)return;
  switch(TOOL.k){
    case "build":placeBp(TOOL.type,x,y);break;
    case "salv":{const s=structAt(x,y);
      if(s&&(s.type==="scrap"||s.type==="cache")){s.desig=true;ST.flags.salv=true}break}
    case "cancel":{const s=structAt(x,y);
      if(s){if(s.bp)cancelBp(s);else{s.desig=false;s.decon=false}}break}
    case "decon":{const s=structAt(x,y);
      if(s&&!s.bp&&(s.type==="ruin"||DEF[s.type].cat==="b"))s.decon=true;break}
    case "zadd":if(colCost(x,y)>=0)ST.zone.add(K(x,y));break;
    case "zdel":ST.zone.delete(K(x,y));break}}
function applyRect(x0,y0,x1,y1){
  const ax=clamp(Math.min(x0,x1),0,MW-1),bx=clamp(Math.max(x0,x1),0,MW-1);
  const ay=clamp(Math.min(y0,y1),0,MH-1),by=clamp(Math.max(y0,y1),0,MH-1);
  for(let y=ay;y<=by;y++)for(let x=ax;x<=bx;x++)applyCell(x,y)}
function paintCell(x,y){if(!PT.paint)return;const k=K(x,y);
  if(PT.paint.has(k))return;PT.paint.add(k);applyCell(x,y)}
function paintTo(c){if(!PT.lastC){PT.lastC=c;paintCell(c.x,c.y);return}
  const x=PT.lastC.x,y=PT.lastC.y;
  const n=Math.max(Math.abs(c.x-x),Math.abs(c.y-y));
  for(let i=1;i<=n;i++)paintCell(Math.round(x+(c.x-x)*i/n),Math.round(y+(c.y-y)*i/n));
  PT.lastC=c}

function spreadCells(x,y,n){const out=[],seen=new Set([K(x,y)]),q=[{x,y}];
  while(q.length&&out.length<n){const c=q.shift();
    if(INB(c.x,c.y)&&colCost(c.x,c.y)>=0)out.push(c);
    for(let k=0;k<8;k++){const X=c.x+DIRS[k][0],Y=c.y+DIRS[k][1];
      if(INB(X,Y)&&!seen.has(K(X,Y))){seen.add(K(X,Y));q.push({x:X,y:Y})}}}
  return out.length?out:[{x,y}]}
function clickSelect(c){const p=pawnAt(c.wx,c.wy);
  if(p){ST.sel=[p];renderInspect();return}
  const f=foeAt(c.wx,c.wy);if(f){ST.sel=[f];renderInspect();return}
  const s=structAt(c.x,c.y);if(s){ST.sel=[s];renderInspect();return}
  ST.sel=[];renderInspect()}
function marqueeSelect(m){
  const ax=Math.min(m.x0,m.x1),bx=Math.max(m.x0,m.x1);
  const ay=Math.min(m.y0,m.y1),by=Math.max(m.y0,m.y1);
  const got=ST.pawns.filter(p=>p.px*T>=ax&&p.px*T<=bx&&p.py*T>=ay&&p.py*T<=by);
  if(got.length)ST.sel=got;else ST.sel=[];
  renderInspect()}
function rmbAction(c){if(TOOL){setTool(null);return}
  const dr=selPawns().filter(p=>p.drafted);
  if(!dr.length)return;
  const f=foeAt(c.wx,c.wy);
  if(f){for(const p of dr){p.forced=f.id;p.order=null}
    log("Target marked: "+f.name,"info");return}
  const cells=spreadCells(c.x,c.y,dr.length);
  dr.forEach((p,i)=>{p.forced=0;p.order=cells[i]||cells[0];p.path=null})}
function tapAction(c){
  if(TOOL){applyCell(c.x,c.y);return}
  const p=pawnAt(c.wx,c.wy);
  if(p){ST.sel=[p];renderInspect();syncHUD();return}
  const dr=selPawns().filter(q=>q.drafted);
  const f=foeAt(c.wx,c.wy);
  if(f){if(dr.length){dr.forEach(q=>{q.forced=f.id;q.order=null})}
    else{ST.sel=[f]}renderInspect();return}
  if(dr.length){const cells=spreadCells(c.x,c.y,dr.length);
    dr.forEach((q,i)=>{q.forced=0;q.order=cells[i]||cells[0];q.path=null});return}
  const s=structAt(c.x,c.y);
  if(s){ST.sel=[s];renderInspect();return}
  ST.sel=[];renderInspect()}
function toggleDraft(){const ps=selPawns();if(!ps.length)return;
  const v=!ps.every(p=>p.drafted);
  for(const p of ps){p.drafted=v;p.order=null;p.forced=0;
    if(v)clearJob(p);else p.path=null}
  SFX.ui();renderInspect();syncHUD()}

/* mouse */
cv.addEventListener("mousedown",e=>{e.preventDefault();SFX.wake();
  if(ST.phase!=="run")return;
  const c=cellAt(e.clientX,e.clientY);
  if(e.button===0){PT.down=true;PT.btn=0;PT.sx=e.clientX;PT.sy=e.clientY;PT.moved=false;
    const dk=dragToolKind();
    if(dk==="paint"){PT.paint=new Set();PT.lastC=c;paintCell(c.x,c.y)}
    else if(dk==="rect")PT.marq={x0:c.wx,y0:c.wy,x1:c.wx,y1:c.wy,rect:true};
    else if(!TOOL)PT.marq={x0:c.wx,y0:c.wy,x1:c.wx,y1:c.wy,rect:false}}
  else{PT.panning=true;PT.btn=e.button;PT.lx=e.clientX;PT.ly=e.clientY;PT.moved=false}});
window.addEventListener("mousemove",e=>{
  const c=cellAt(e.clientX,e.clientY);
  PT.hoverX=c.x;PT.hoverY=c.y;PT.hwx=c.wx;PT.hwy=c.wy;
  if(PT.panning){const dx=e.clientX-PT.lx,dy=e.clientY-PT.ly;
    if(Math.abs(dx)+Math.abs(dy)>3)PT.moved=true;
    cam.x-=dx/cam.z;cam.y-=dy/cam.z;clampCam();
    PT.lx=e.clientX;PT.ly=e.clientY;return}
  if(!PT.down)return;
  if(Math.hypot(e.clientX-PT.sx,e.clientY-PT.sy)>4)PT.moved=true;
  if(PT.paint)paintTo(c);
  else if(PT.marq){PT.marq.x1=c.wx;PT.marq.y1=c.wy}});
window.addEventListener("mouseup",e=>{
  if(PT.panning){PT.panning=false;
    if(e.button===2&&!PT.moved&&ST.phase==="run")rmbAction(cellAt(e.clientX,e.clientY));
    return}
  if(!PT.down)return;PT.down=false;
  if(ST.phase!=="run"){PT.paint=null;PT.marq=null;return}
  const c=cellAt(e.clientX,e.clientY);
  if(PT.paint){PT.paint=null;PT.lastC=null;return}
  if(PT.marq){const m=PT.marq;PT.marq=null;
    if(m.rect){applyRect(Math.floor(m.x0/T),Math.floor(m.y0/T),
      Math.floor(m.x1/T),Math.floor(m.y1/T));return}
    if(!PT.moved)clickSelect(c);else marqueeSelect(m);
    syncHUD();return}
  if(TOOL&&dragToolKind()==="single")applyCell(c.x,c.y)});
cv.addEventListener("contextmenu",e=>e.preventDefault());
cv.addEventListener("wheel",e=>{e.preventDefault();if(ST.phase!=="run")return;
  const f=e.deltaY<0?1.12:1/1.12;
  const nz=clamp(cam.z*f,.7,3);
  const w=s2w(e.clientX,e.clientY);
  cam.x=w.wx-e.clientX/nz;cam.y=w.wy-e.clientY/nz;cam.z=nz;clampCam()},{passive:false});

/* keyboard */
window.addEventListener("keydown",e=>{const k=e.key.toLowerCase();KEYS[k]=true;
  if($("modal").classList.contains("open")){
    if(k==="escape"&&ST.phase==="run")hideModal();return}
  if(ST.phase!=="run")return;
  if(k===" "){togglePause();e.preventDefault()}
  else if(k==="1")setSpeed(1);else if(k==="2")setSpeed(2);else if(k==="3")setSpeed(3);
  else if(k==="r")toggleDraft();
  else if(k==="escape"){if(TOOL)setTool(null);
    else{ST.sel=[];renderInspect();closeSub();syncHUD()}}});
window.addEventListener("keyup",e=>{KEYS[e.key.toLowerCase()]=false});

/* touch */
cv.addEventListener("touchstart",e=>{e.preventDefault();SFX.wake();
  if(ST.phase!=="run")return;
  for(const t of e.changedTouches)
    PT.touches.set(t.identifier,{x:t.clientX,y:t.clientY,sx:t.clientX,sy:t.clientY,t0:performance.now()});
  if(PT.touches.size===2){const a=[...PT.touches.values()];
    PT.pinch={d:Math.hypot(a[1].x-a[0].x,a[1].y-a[0].y)};
    PT.marq=null;PT.paint=null;PT.lastC=null}
  else if(PT.touches.size===1&&TOOL&&dragToolKind()==="paint"){
    const c=cellAt(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    PT.paint=new Set();PT.lastC=c;paintCell(c.x,c.y)}},{passive:false});
cv.addEventListener("touchmove",e=>{e.preventDefault();if(ST.phase!=="run")return;
  for(const t of e.changedTouches){const r=PT.touches.get(t.identifier);
    if(r){r.px=r.x;r.py=r.y;r.x=t.clientX;r.y=t.clientY}}
  const a=[...PT.touches.values()];
  if(a.length>=2&&PT.pinch){
    const d=Math.hypot(a[1].x-a[0].x,a[1].y-a[0].y);
    const ccx=(a[0].x+a[1].x)/2,ccy=(a[0].y+a[1].y)/2;
    const nz=clamp(cam.z*d/Math.max(1,PT.pinch.d),.7,3);
    const w=s2w(ccx,ccy);
    cam.x=w.wx-ccx/nz;cam.y=w.wy-ccy/nz;cam.z=nz;PT.pinch.d=d;clampCam();return}
  if(a.length===1){const r=a[0];
    const moved=Math.hypot(r.x-r.sx,r.y-r.sy);
    const c=cellAt(r.x,r.y);
    PT.hoverX=c.x;PT.hoverY=c.y;PT.hwx=c.wx;PT.hwy=c.wy;
    if(TOOL){const dk=dragToolKind();
      if(dk==="paint"&&PT.paint)paintTo(c);
      else if(dk==="rect"&&moved>8){
        if(!PT.marq){const s0=cellAt(r.sx,r.sy);
          PT.marq={x0:s0.wx,y0:s0.wy,x1:c.wx,y1:c.wy,rect:true}}
        else{PT.marq.x1=c.wx;PT.marq.y1=c.wy}}
      return}
    if(moved>8&&r.px!==undefined){
      cam.x-=(r.x-r.px)/cam.z;cam.y-=(r.y-r.py)/cam.z;clampCam()}}},{passive:false});
cv.addEventListener("touchend",e=>{e.preventDefault();if(ST.phase!=="run")return;
  for(const t of e.changedTouches){const r=PT.touches.get(t.identifier);
    PT.touches.delete(t.identifier);
    if(!r||PT.touches.size>0)continue;
    PT.pinch=null;
    const dur=performance.now()-r.t0;
    const moved=Math.hypot(t.clientX-r.sx,t.clientY-r.sy);
    const c=cellAt(t.clientX,t.clientY);
    if(PT.paint){PT.paint=null;PT.lastC=null;continue}
    if(PT.marq){const m=PT.marq;PT.marq=null;
      applyRect(Math.floor(m.x0/T),Math.floor(m.y0/T),
        Math.floor(m.x1/T),Math.floor(m.y1/T));continue}
    if(dur<400&&moved<10)tapAction(c)}},{passive:false});
cv.addEventListener("touchcancel",e=>{
  for(const t of e.changedTouches)PT.touches.delete(t.identifier);
  PT.pinch=null;PT.paint=null;PT.marq=null;PT.lastC=null});

/* ============================================================
   UI / DOM
   ============================================================ */
function log(msg,cls){const d=document.createElement("div");
  d.className=cls||"info";d.textContent="» "+msg;
  const L=$("log");L.prepend(d);
  while(L.children.length>40)L.removeChild(L.lastChild)}
let banT=0;
function banner(txt,cls){const b=$("banner");
  b.textContent=txt;b.className=cls||"";b.classList.add("show");
  clearTimeout(banT);banT=setTimeout(()=>b.classList.remove("show"),2400)}
function flashMsg(m){log(m,"warn")}
function showModal(html){$("modal").innerHTML="<div class='mbox'>"+html+"</div>";
  $("modal").classList.add("open")}
function hideModal(){$("modal").classList.remove("open")}
$("modal").addEventListener("click",e=>{const id=e.target.id;
  if(id==="m-start"||id==="m-restart"){SFX.wake();SFX.ui();newGame()}
  else if(id==="m-close"){SFX.ui();hideModal()}});

function syncHUD(){
  $("h-scrap").textContent=ST.res.scrap;$("h-comp").textContent=ST.res.comp;
  $("h-raw").textContent=ST.res.raw;$("h-meal").textContent=ST.res.meal;
  const pw=$("h-pwr");pw.textContent="PWR "+ST.pwU+"/"+ST.pwG;
  pw.classList.toggle("bad",!ST.pwOk&&ST.pwU>0);
  const h=hourN();
  const hh=String(Math.floor(h)).padStart(2,"0");
  const mm=String(Math.floor((h%1)*60)).padStart(2,"0");
  $("h-day").textContent="DAY "+dayN()+" "+hh+":"+mm;
  let bea=null;
  for(const s of ST.structs.values())if(s.type==="beacon"&&!s.bp){bea=s;break}
  const ex=$("h-extract");
  if(bea){ex.style.display="";$("h-exv").textContent=Math.floor(bea.charge/TPD*100)+"%"}
  else ex.style.display="none";
  const ps=selPawns();
  $("t-draft").style.display=ps.length?"":"none";
  const dr=ps.length&&ps.every(p=>p.drafted);
  $("t-draft").textContent=(dr?"UNDRAFT":"DRAFT")+" [R]";
  $("t-draft").classList.toggle("on",!!dr)}

const CK=[
  {id:"zone",t:"Zone a stockpile (ZONES)"},
  {id:"salv",t:"Designate scrap salvage (ORDERS)"},
  {id:"haul",t:"Haul supplies to the stockpile"},
  {id:"wall",t:"Wall a perimeter with a door"},
  {id:"pod",t:"Build two sleep pods"},
  {id:"food",t:"Build Synth Station + Algae Vat"},
  {id:"pwr",t:"Build a Fusion Cell"},
  {id:"def",t:"Build an Auto-Turret"},
  {id:"beacon",t:"Build the Extraction Beacon"}];
function renderChecklist(){const ul=$("ck");let h="";
  for(const c of CK)h+="<li class='"+(ST.flags[c.id]?"done":"")+"'>"+c.t+"</li>";
  if(ul.innerHTML!==h)ul.innerHTML=h}

function barHtml(lab,val,col){
  return "<div class='blab'><span>"+lab+"</span><span>"+Math.round(val)+"</span></div>"+
    "<div class='bar'><i style='width:"+clamp(val,0,100)+"%;background:"+col+"'></i></div>"}
function renderInspect(){const el=$("inspect");
  ST.sel=ST.sel.filter(e=>e.kind==="pawn"?ST.pawns.includes(e):
    e.kind==="foe"?ST.foes.includes(e):structAt(e.x,e.y)===e);
  if(!ST.sel.length){el.style.display="none";return}
  el.style.display="block";
  if(ST.sel.length>1){
    el.innerHTML="<h3>"+ST.sel.length+" RUNNERS</h3><div class='sub'>squad selected</div>"+
      "<button class='tb' id='i-draft'>TOGGLE DRAFT</button>";return}
  const e=ST.sel[0];
  if(e.kind==="pawn"){
    let h="<h3 style='color:"+e.accent+"'>"+e.name+"</h3>";
    h+="<div class='sub'>"+e.tr.map(t=>t.n).join(" · ")+" — "+e.weapon.name+"</div>";
    h+=barHtml("HP",e.hp,"#39ff88");
    h+=barHtml("FOOD",e.needs.food,"#b8ff5e");
    h+=barHtml("REST",e.needs.rest,"#7aa2ff");
    h+=barHtml("MOOD",e.mood,e.mood<25?"#ff4757":"#ffd84a");
    h+="<div class='sub'>TASK: "+jobLabel(e)+"</div>";
    h+="<div class='sub'>SAL "+e.sk.sal+" · BLD "+e.sk.bld+" · COOK "+e.sk.cook+" · SHT "+e.sk.sht+"</div>";
    h+="<button class='tb' id='i-draft'>"+(e.drafted?"UNDRAFT":"DRAFT")+"</button>";
    el.innerHTML=h}
  else if(e.kind==="foe"){
    el.innerHTML="<h3 style='color:"+e.col+"'>"+e.name+"</h3>"+
      "<div class='sub'>hostile</div>"+barHtml("HP",e.hp/e.maxHp*100,"#ff4757")}
  else{const d=DEF[e.type];
    let h="<h3>"+d.name+"</h3>";
    if(e.bp)h+="<div class='sub'>BLUEPRINT — "+Math.floor(e.prog/e.need*100)+"% built</div>";
    else if(d.hp>1)h+=barHtml("INTEGRITY",e.hp/e.maxHp*100,"#39ff88");
    if(d.pw)h+="<div class='sub'>POWER DRAW "+d.pw+" — "+
      (e.powered?"<span style='color:var(--gn)'>ONLINE</span>":"<span style='color:var(--rd)'>OFFLINE</span>")+"</div>";
    if(d.pwGen)h+="<div class='sub'>OUTPUT +"+d.pwGen+
      (ST.black>ST.tick?" <span style='color:var(--rd)'>(BLACKOUT)</span>":"")+"</div>";
    if(e.type==="pod"&&e.owner){const o=ST.pawns.find(p=>p.id===e.owner);
      h+="<div class='sub'>Assigned: "+(o?o.name:"—")+"</div>"}
    if(e.type==="vat"&&!e.bp)h+="<div class='sub'>Growth "+Math.floor(e.vt/600*100)+"%</div>";
    if(e.type==="beacon"&&!e.bp)h+="<div class='sub'>CHARGE "+Math.floor(e.charge/TPD*100)+"%</div>";
    if(d.desc)h+="<div class='sub'>"+d.desc+"</div>";
    if(e.bp)h+="<button class='tb' id='i-cancel'>CANCEL</button>";
    else if(e.type==="scrap"||e.type==="cache")
      h+="<button class='tb' id='i-salv'>"+(e.desig?"UNMARK":"SALVAGE")+"</button>";
    else if(e.type==="ruin"||d.cat==="b")
      h+="<button class='tb' id='i-decon'>"+(e.decon?"CANCEL DECON":"DECONSTRUCT")+"</button>";
    el.innerHTML=h}}
$("inspect").addEventListener("click",e=>{const id=e.target.id;if(!id)return;
  const sel=ST.sel[0];SFX.ui();
  if(id==="i-draft")toggleDraft();
  else if(id==="i-cancel"&&sel&&sel.bp){cancelBp(sel);ST.sel=[];renderInspect()}
  else if(id==="i-salv"&&sel){sel.desig=!sel.desig;
    if(sel.desig)ST.flags.salv=true;renderInspect()}
  else if(id==="i-decon"&&sel){sel.decon=!sel.decon;renderInspect()}});

/* toolbar */
let subCat=null;
function refreshCats(){$("t-build").classList.toggle("on",subCat==="b");
  $("t-orders").classList.toggle("on",subCat==="o");
  $("t-zones").classList.toggle("on",subCat==="z")}
function closeSub(){subCat=null;$("submenu").classList.remove("open");refreshCats()}
function refreshToolBtns(){const sm=$("submenu");
  for(const b of sm.children){const dt=b.dataset.tool;let on=false;
    if(TOOL&&dt){if(TOOL.k==="build")on=dt==="build:"+TOOL.type;else on=dt===TOOL.k}
    b.classList.toggle("on",on)}}
function openSub(cat){if(subCat===cat){closeSub();return}
  subCat=cat;const sm=$("submenu");sm.innerHTML="";
  function mk(label,tool,title){const b=document.createElement("button");
    b.className="tb";b.innerHTML=label;if(title)b.title=title;
    b.dataset.tool=tool.k==="build"?"build:"+tool.type:tool.k;
    b.onclick=()=>{SFX.ui();setTool(tool)};sm.appendChild(b)}
  if(cat==="b"){for(const t of BUILD_ORDER){const d=DEF[t];
    const cost=Object.entries(d.cost).map(([k,v])=>v+" "+k).join(" + ");
    mk(d.name+"<span class='cost'>"+cost+"</span>",{k:"build",type:t},d.desc)}}
  else if(cat==="o"){
    mk("SALVAGE",{k:"salv"},"Drag over scrap heaps and caches");
    mk("DECONSTRUCT",{k:"decon"},"Drag over structures to tear down (50% refund / ruins yield scrap)");
    mk("CANCEL",{k:"cancel"},"Drag to cancel blueprints and designations")}
  else{
    mk("STOCKPILE +",{k:"zadd"},"Drag to zone a stockpile — hauled goods become usable here");
    mk("STOCKPILE −",{k:"zdel"},"Drag to remove stockpile cells")}
  sm.classList.add("open");refreshCats();refreshToolBtns()}
$("t-build").onclick=()=>{SFX.ui();openSub("b")};
$("t-orders").onclick=()=>{SFX.ui();openSub("o")};
$("t-zones").onclick=()=>{SFX.ui();openSub("z")};
$("t-draft").onclick=toggleDraft;
$("b-all").onclick=()=>{SFX.ui();ST.sel=ST.pawns.slice();renderInspect();syncHUD()};
$("b-mute").onclick=function(){this.classList.toggle("on",SFX.toggleMute())};
$("b-help").onclick=()=>{SFX.ui();showHelp()};
$("cancelTool").onclick=()=>{SFX.ui();setTool(null)};
function setSpeed(s){ST.speed=s;ST.paused=false;refreshSpd()}
function togglePause(){ST.paused=!ST.paused;refreshSpd()}
function refreshSpd(){$("sp-p").classList.toggle("on",ST.paused);
  $("sp-1").classList.toggle("on",!ST.paused&&ST.speed===1);
  $("sp-2").classList.toggle("on",!ST.paused&&ST.speed===2);
  $("sp-3").classList.toggle("on",!ST.paused&&ST.speed===3)}
$("sp-p").onclick=()=>{SFX.ui();togglePause()};
$("sp-1").onclick=()=>{SFX.ui();setSpeed(1)};
$("sp-2").onclick=()=>{SFX.ui();setSpeed(2)};
$("sp-3").onclick=()=>{SFX.ui();setSpeed(3)};

function showHelp(){if(ST.phase==="run"){ST.paused=true;refreshSpd()}showModal(
  "<h1 style='font-size:20px'>FIELD MANUAL</h1><div class='mh-sub'>NEON SPRAWL</div>"+
  "<p>Keep the crew fed, rested, and sane. Runners work jobs automatically by priority: cook → build → salvage → haul. Salvage only counts once it is hauled into a stockpile zone.</p>"+
  "<table>"+
  "<tr><td>Select</td><td>Click/tap a runner. Drag on open ground to box-select. SQUAD selects everyone.</td></tr>"+
  "<tr><td>Draft</td><td>R or the DRAFT button. Drafted runners stop working, hold position, and shoot.</td></tr>"+
  "<tr><td>Command</td><td>Right-click (desktop) or tap (touch) ground to move drafted runners; an enemy to focus-fire.</td></tr>"+
  "<tr><td>Camera</td><td>WASD / arrows / right-drag / one-finger drag. Wheel or pinch to zoom.</td></tr>"+
  "<tr><td>Build</td><td>BUILD menu, click to place. Walls paint with click-drag. Blueprints consume resources on placement.</td></tr>"+
  "<tr><td>Power</td><td>Fusion Cells generate 12. If demand exceeds supply, ALL powered devices go offline.</td></tr>"+
  "<tr><td>Food</td><td>Algae Vat grows protein; Synth Station turns 2 protein into 1 meal. Raw protein is edible but tanks mood.</td></tr>"+
  "<tr><td>Mood</td><td>Below ~22, runners can snap and wander dazed. Pods, hot meals, and neon lamps help.</td></tr>"+
  "<tr><td>Speed</td><td>Space pauses. 1/2/3 set game speed.</td></tr>"+
  "<tr><td>Win</td><td>Build the Extraction Beacon and keep it powered for one full day.</td></tr>"+
  "</table><button class='tb big' id='m-close'>CLOSE</button>")}
function showStart(){showModal(
  "<h1>NEON SPRAWL</h1><div class='mh-sub'>COLONY PROTOCOL</div>"+
  "<p>2087. Your crew of three runners just claimed a dead block on the edge of the sprawl. Scrap is currency, protein is life, and the gangs come hunting after dark.</p>"+
  "<p>Salvage. Build. Defend. Then raise an <span style='color:var(--cy)'>Extraction Beacon</span> and keep it powered for one full day to buy your way out.</p>"+
  "<button class='tb big' id='m-start'>INITIALIZE COLONY</button>"+
  "<p style='color:var(--dim);font-size:10px'>Hit ? in the top bar for the field manual · v0.1</p>")}

/* ============================================================
   GAME START / MAIN LOOP
   ============================================================ */
function newGame(){
  ST.phase="run";ST.tick=0;ST.speed=1;ST.paused=false;
  ST.res={scrap:0,comp:0,raw:0,meal:0};
  ST.pawns.length=0;ST.foes.length=0;ST.beams.length=0;ST.floats.length=0;
  ST.grp={};ST.sel=[];ST.storm=0;ST.black=0;
  ST.stats={kills:0,built:0,deaths:0,salv:0,hauled:0,raids:0};
  ST.flags={};setTool(null);closeSub();
  genMap();drawTerrain();
  ST.fog=new Uint8Array(MW*MH).fill(1);
  const cx=MW/2|0,cy=MH/2|0;
  const vex=mkPawn(cx-2,cy-1,"sal");
  vex.name="Vex";vex.accent=ACC[0];Object.assign(vex.pers,{ind:40,cau:30,soc:60,cur:80});
  ST.pawns.push(vex);
  const sta=mkPawn(cx+2,cy-1,"bld");
  sta.name="Static";sta.accent=ACC[1];Object.assign(sta.pers,{ind:80,cau:65,soc:45,cur:25});
  ST.pawns.push(sta);
  cam.z=clamp(Math.min(VW/(MW*T),VH/(MH*T))*1.9,1,2.2);
  cam.x=cx*T-VW/cam.z/2;cam.y=cy*T-VH/cam.z/2;clampCam();
  ST.lastRaid=0;ST.nextEv=Math.floor(TPD*1.25);
  $("log").innerHTML="";
  log("Vex and Static holed up in the dead district. Daylight won't last.","info");
  log("Zone a stockpile, mark scrap for salvage, and get walls up before the gangs notice.","info");
  powerRecalc();updateFlags();syncHUD();renderInspect();refreshSpd();hideModal();
  banner("DAY 1 — THE SPRAWL","good")}

let lastT=0,acc=0;
function loop(ts){requestAnimationFrame(loop);
  const dt=Math.min(60,lastT?ts-lastT:16);lastT=ts;
  if(ST.phase==="run"&&!ST.paused){
    acc+=dt;const step=100/ST.speed;let n=0;
    while(acc>=step&&n<10){tick();acc-=step;n++;if(ST.phase!=="run")break}
    if(n>=10)acc=0}
  if(ST.phase==="run"){let dx=0,dy=0;const sp=.55*dt/cam.z;
    if(KEYS.w||KEYS.arrowup)dy-=sp;
    if(KEYS.s||KEYS.arrowdown)dy+=sp;
    if(KEYS.a||KEYS.arrowleft)dx-=sp;
    if(KEYS.d||KEYS.arrowright)dx+=sp;
    if(dx||dy){cam.x+=dx;cam.y+=dy;clampCam()}}
  render()}

window.addEventListener("resize",resize);
resize();renderChecklist();showStart();
requestAnimationFrame(loop);
</script>
